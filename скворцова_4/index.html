<!DOCTYPE html>
<html lang="uk"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Інтерактивний урок</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; background: #f0f2f5; }
        
        #presentation-area { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: white; }
        
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: white; }
        .slide.active { display: block; }
        
        .element { position: absolute; box-sizing: border-box; transform-origin: center center; }
        .text-element { display: flex; align-items: center; justify-content: center; text-align: center; }
        .draggable { overflow: hidden; }
        
        .img-wrapper { min-width: 30px; min-height: 30px; display: block; }
        .keep-ratio { resize: horizontal !important; height: auto !important; }
        .keep-ratio .crop-inner img { width: 100%; height: auto; display: block; object-fit: contain; pointer-events: none; }
        .free-ratio { resize: both !important; }
        .free-ratio .crop-inner img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
        
        .crop-inner { width: 100%; height: 100%; pointer-events: none; transition: clip-path 0s; display: block; }
        
        .crop-handle { position: absolute; width: 14px; height: 14px; background: #007bff; border: 2px solid white; border-radius: 50%; z-index: 1000; display: none; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
        .edit-mode .selected .crop-handle { display: block; }
        .crop-handle:hover { transform: scale(1.2); background: #dc3545; }
        .ch-t { top: -7px; left: calc(50% - 7px); cursor: ns-resize; }
        .ch-b { bottom: -7px; left: calc(50% - 7px); cursor: ns-resize; }
        .ch-l { top: calc(50% - 7px); left: -7px; cursor: ew-resize; }
        .ch-r { top: calc(50% - 7px); right: -7px; cursor: ew-resize; }

        #crop-marquee { position: fixed; border: 2px dashed #dc3545; background: rgba(220, 53, 69, 0.2); z-index: 999999; display: none; pointer-events: none; }

        .edit-mode .element { cursor: move; outline: 1px dashed #ccc; }
        .edit-mode .element:hover { outline: 2px dashed #007bff; }
        .edit-mode .selected { outline: 3px solid #007bff !important; z-index: 9999 !important; }
        
        /* Внутрішній шар для складних фігур, щоб не обрізати рамку зміни розміру */
        .inner-shape-fill { width: 100%; height: 100%; pointer-events: none; }
        .transparent-bg .inner-shape-fill { background-color: transparent !important; }
        
        .edit-mode .element[data-hidden-init="true"] { opacity: 0.5 !important; outline: 2px dashed #dc3545 !important; }
        .edit-mode .element[data-hidden-init="true"].selected { outline: 3px solid #dc3545 !important; }
        
        .view-mode { user-select: none; -webkit-user-select: none; }
        .view-mode .element { cursor: default; outline: none !important; resize: none !important; }
        .view-mode .interactive { cursor: pointer; }
        
        .view-mode .draggable-play { cursor: grab !important; }
        .view-mode .draggable-play:active { cursor: grabbing !important; }
        
        #main-mode-toggle {
            position: absolute; top: 15px; right: 15px; z-index: 99999;
            padding: 6px 14px; font-size: 13px; font-weight: bold;
            background: rgba(255, 255, 255, 0.6); color: #333;
            border: 1px solid rgba(0,0,0,0.15); border-radius: 20px; cursor: pointer; 
            backdrop-filter: blur(5px); transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        #main-mode-toggle:hover { background: rgba(255, 255, 255, 0.95); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .edit-mode #main-mode-toggle { background: rgba(230, 242, 255, 0.8); color: #0056b3; border-color: rgba(0, 86, 179, 0.3); }
        
        #side-media-panel {
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%);
            z-index: 100000; background: rgba(255, 255, 255, 0.8);
            padding: 15px 8px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        #side-media-panel button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0; transition: transform 0.2s; }
        #side-media-panel button:hover { transform: scale(1.2); }
        #global-volume {
            -webkit-appearance: slider-vertical; appearance: slider-vertical;
            width: 4px; height: 100px; cursor: pointer; margin: 5px 0; outline: none;
        }

        #toolbar { 
            position: absolute; top: 15px; left: 15px; width: 340px; 
            background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            z-index: 10000; display: flex; flex-direction: column; max-height: 90vh;
        }
        #toolbar-header { background: #6f42c1; color: white; padding: 10px; cursor: move; font-weight: bold; display: flex; justify-content: space-between; align-items: center; user-select: none; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .toolbar-content { padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 14px; overflow-y: auto; }
        
        #layers-panel {
            position: absolute; top: 15px; left: 370px; width: 230px; background: white; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10002; display: flex; flex-direction: column; max-height: 80vh;
        }
        #layers-header {
            background: #e83e8c; color: white; padding: 10px; cursor: move; font-weight: bold; display: flex; justify-content: space-between; align-items: center; user-select: none; border-top-left-radius: 8px; border-top-right-radius: 8px;
        }
        #layers-list { padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

        #slide-panel {
            position: absolute; top: 60px; right: 15px; width: 220px; height: calc(100vh - 75px);
            background: #343a40; color: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10001; display: flex; flex-direction: column;
        }
        #slide-panel-header {
            background: #23272b; padding: 10px 15px; cursor: move; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; align-items: center; user-select: none; border-top-left-radius: 8px; border-top-right-radius: 8px; color: #aaa;
        }
        .slide-panel-content {
            display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start;
            padding: 15px; box-sizing: border-box; gap: 12px; overflow-y: auto; flex: 1;
        }

        .panel-collapse-btn { background: none; border: none; color: inherit; cursor: pointer; font-weight: bold; padding: 0 5px; opacity: 0.7; }
        .panel-collapse-btn:hover { opacity: 1; }
        
        .view-mode #toolbar, .view-mode #slide-panel, .view-mode #layers-panel { display: none !important; }

        button.action-btn { padding: 6px 12px; cursor: pointer; background: #e9ecef; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        button.action-btn:hover { background: #d3d9df; }
        button.primary { background: #007bff; color: white; border: none; }
        button.success { background: #28a745; color: white; border: none; }
        button.danger { background: #dc3545; color: white; border: none; }
        
        input[type="text"], input[type="number"], select, input[type="range"] { padding: 4px; border: 1px solid #ccc; border-radius: 3px; font-family: inherit; width: 100%; box-sizing: border-box; }
        .flex-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap;}
        .properties { display: none; flex-direction: column; gap: 6px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        
        .transparent-bg { background-color: transparent !important; }
        .no-border { border: none !important; }

        #sorter-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 100000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #sorter-modal { background: #f0f2f5; width: 90vw; height: 85vh; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #sorter-header { padding: 15px 25px; background: #343a40; color: white; display: flex; justify-content: space-between; align-items: center; }
        #sorter-header h2 { margin: 0; font-size: 22px; font-weight: normal; }
        #sorter-grid { padding: 25px; display: flex; flex-wrap: wrap; gap: 25px; overflow-y: auto; align-content: flex-start; }
        .thumb-wrapper { width: 200px; height: 125px; background: white; border: 3px solid #ccc; border-radius: 8px; position: relative; cursor: grab; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s, border-color 0.2s; }
        .thumb-wrapper:hover { transform: scale(1.05); border-color: #007bff; }
        .thumb-wrapper:active { cursor: grabbing; transform: scale(1.05); }
        .thumb-wrapper.drag-over { border: 3px dashed #28a745; transform: scale(1.1); box-shadow: 0 0 15px rgba(40,167,69,0.5); }
        .thumb-number { position: absolute; top: 8px; left: 8px; background: #007bff; color: white; padding: 4px 10px; border-radius: 12px; font-size: 14px; z-index: 10; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .thumb-content { transform-origin: top left; pointer-events: none; background: white; }
        .thumb-wrapper * { pointer-events: none; }

        .trans-fade { animation: fadeIn 0.5s; }
        .trans-slide-right { animation: slideInRight 0.5s forwards; }
        .trans-slide-left { animation: slideInLeft 0.5s forwards; }
        .trans-slide-up { animation: slideInUp 0.5s forwards; }
        .trans-slide-down { animation: slideInDown 0.5s forwards; }
        .trans-zoom-in { animation: zoomIn 0.5s; }
        .trans-zoom-out { animation: zoomOut 0.5s; }
        .trans-flip-x { animation: flipX 0.6s; }
        .trans-flip-y { animation: flipY 0.6s; }
        .trans-rotate { animation: rotateIn 0.6s; }
        .trans-bounce-in { animation: bounceIn 0.8s; }
        .trans-roll-in { animation: rollIn 0.6s; }
        .trans-lightspeed { animation: lightSpeedIn 0.5s; }
        .trans-zoom-up { animation: zoomInUp 0.6s; }
        .trans-zoom-down { animation: zoomInDown 0.6s; }
        .trans-rotate-down { animation: rotateInDownLeft 0.6s; }
        .trans-blur-in { animation: blurIn 0.6s; }
        .trans-slit-in { animation: slitIn 0.6s ease-out forwards; }
        .trans-push-left { animation: pushLeft 0.5s forwards; }
        .trans-push-right { animation: pushRight 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideInDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes zoomOut { from { transform: scale(1.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flipX { from { transform: perspective(400px) rotateX(90deg); opacity: 0; } to { transform: perspective(400px) rotateX(0deg); opacity: 1; } }
        @keyframes flipY { from { transform: perspective(400px) rotateY(90deg); opacity: 0; } to { transform: perspective(400px) rotateY(0deg); opacity: 1; } }
        @keyframes rotateIn { from { transform: rotate(-200deg) scale(0.5); opacity: 0; } to { transform: perspective(400px) rotate(0) scale(1); opacity: 1; } }
        @keyframes bounceIn { 0%, 20%, 40%, 60%, 80%, 100% { animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); } 0% { opacity: 0; transform: scale3d(0.3, 0.3, 0.3); } 20% { transform: scale3d(1.1, 1.1, 1.1); } 40% { transform: scale3d(0.9, 0.9, 0.9); } 60% { opacity: 1; transform: scale3d(1.03, 1.03, 1.03); } 80% { transform: scale3d(0.97, 0.97, 0.97); } 100% { opacity: 1; transform: scale3d(1, 1, 1); } }
        @keyframes rollIn { from { opacity: 0; transform: translate3d(-100%, 0, 0) rotate3d(0, 0, 1, -120deg); } to { opacity: 1; transform: translate3d(0, 0, 0); } }
        @keyframes lightSpeedIn { from { transform: translate3d(100%, 0, 0) skewX(-30deg); opacity: 0; } 60% { transform: skewX(20deg); opacity: 1; } 80% { transform: skewX(-5deg); } to { transform: translate3d(0, 0, 0); } }
        @keyframes zoomInUp { from { opacity: 0; transform: scale3d(0.1, 0.1, 0.1) translate3d(0, 1000px, 0); animation-timing-function: cubic-bezier(0.55, 0.055, 0.675, 0.19); } 60% { opacity: 1; transform: scale3d(0.475, 0.475, 0.475) translate3d(0, -60px, 0); animation-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1); } }
        @keyframes zoomInDown { from { opacity: 0; transform: scale3d(0.1, 0.1, 0.1) translate3d(0, -1000px, 0); } 60% { opacity: 1; transform: scale3d(0.475, 0.475, 0.475) translate3d(0, 60px, 0); } }
        @keyframes rotateInDownLeft { from { transform-origin: left bottom; transform: rotate3d(0, 0, 1, -45deg); opacity: 0; } to { transform-origin: left bottom; transform: translate3d(0, 0, 0); opacity: 1; } }
        @keyframes blurIn { from { filter: blur(20px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
        @keyframes slitIn { 0% { transform: translateZ(-800px) rotateY(90deg); opacity: 0; } 54% { transform: translateZ(-160px) rotateY(87deg); opacity: 1; } 100% { transform: translateZ(0) rotateY(0); opacity: 1; } }
        @keyframes pushLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes pushRight { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        @keyframes aPulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes aShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        @keyframes aBounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); } }
        @keyframes aTada { 0% { transform: scale(1); } 10%, 20% { transform: scale(0.9) rotate(-3deg); } 30%, 50%, 70%, 90% { transform: scale(1.1) rotate(3deg); } 40%, 60%, 80% { transform: scale(1.1) rotate(-3deg); } 100% { transform: scale(1) rotate(0); } }
        @keyframes aWobble { 0% { transform: translateX(0%); } 15% { transform: translateX(-25%) rotate(-5deg); } 30% { transform: translateX(20%) rotate(3deg); } 45% { transform: translateX(-15%) rotate(-3deg); } 60% { transform: translateX(10%) rotate(2deg); } 75% { transform: translateX(-5%) rotate(-1deg); } 100% { transform: translateX(0%); } }
        @keyframes aFlash { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0; } }
        @keyframes aRubber { 0% { transform: scale(1); } 30% { transform: scaleX(1.25) scaleY(0.75); } 40% { transform: scaleX(0.75) scaleY(1.25); } 50% { transform: scaleX(1.15) scaleY(0.85); } 65% { transform: scaleX(0.95) scaleY(1.05); } 75% { transform: scaleX(1.05) scaleY(0.95); } 100% { transform: scale(1); } }
        
        @keyframes aGlowGreen { 50% { box-shadow: 0 0 30px 10px #28a745, inset 0 0 20px #28a745; } }
        @keyframes aGlowRed { 50% { box-shadow: 0 0 30px 10px #dc3545, inset 0 0 20px #dc3545; } }
        @keyframes aGlowBlue { 50% { box-shadow: 0 0 30px 10px #007bff, inset 0 0 20px #007bff; } }
        @keyframes aGlowYellow { 50% { box-shadow: 0 0 30px 10px #ffc107, inset 0 0 20px #ffc107; } }
        @keyframes aGlowPurple { 50% { box-shadow: 0 0 30px 10px #6f42c1, inset 0 0 20px #6f42c1; } }

        @keyframes aGlowSteadyGreen { 0%, 100% { box-shadow: 0 0 30px 10px #28a745, inset 0 0 20px #28a745; } }
        @keyframes aGlowSteadyRed { 0%, 100% { box-shadow: 0 0 30px 10px #dc3545, inset 0 0 20px #dc3545; } }
        @keyframes aGlowSteadyBlue { 0%, 100% { box-shadow: 0 0 30px 10px #007bff, inset 0 0 20px #007bff; } }
        @keyframes aGlowSteadyYellow { 0%, 100% { box-shadow: 0 0 30px 10px #ffc107, inset 0 0 20px #ffc107; } }
        @keyframes aGlowSteadyPurple { 0%, 100% { box-shadow: 0 0 30px 10px #6f42c1, inset 0 0 20px #6f42c1; } }

        @keyframes aHeartbeat { 0% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }
        @keyframes aHinge { 0% { transform-origin: top left; animation-timing-function: ease-in-out; } 20%, 60% { transform: rotate3d(0, 0, 1, 80deg); transform-origin: top left; animation-timing-function: ease-in-out; } 40%, 80% { transform: rotate3d(0, 0, 1, 60deg); transform-origin: top left; animation-timing-function: ease-in-out; opacity: 1; } to { transform: translate3d(0, 700px, 0); opacity: 0; } }
        @keyframes aFlipX { from { transform: perspective(400px) rotate3d(1, 0, 0, 90deg); animation-timing-function: ease-in; opacity: 0; } 40% { transform: perspective(400px) rotate3d(1, 0, 0, -20deg); animation-timing-function: ease-in; } 60% { transform: perspective(400px) rotate3d(1, 0, 0, 10deg); opacity: 1; } 80% { transform: perspective(400px) rotate3d(1, 0, 0, -5deg); } to { transform: perspective(400px); opacity: 1; } }
        @keyframes aFlipY { from { transform: perspective(400px) rotate3d(0, 1, 0, 90deg); animation-timing-function: ease-in; opacity: 0; } 40% { transform: perspective(400px) rotate3d(0, 1, 0, -20deg); animation-timing-function: ease-in; } 60% { transform: perspective(400px) rotate3d(0, 1, 0, 10deg); opacity: 1; } 80% { transform: perspective(400px) rotate3d(0, 1, 0, -5deg); } to { transform: perspective(400px); opacity: 1; } }
        @keyframes aZoomOut { from { opacity: 1; } 50% { opacity: 0; transform: scale3d(0.3, 0.3, 0.3); } to { opacity: 0; } }
        @keyframes aSlideOutRight { from { transform: translate3d(0, 0, 0); } to { visibility: hidden; transform: translate3d(100%, 0, 0); opacity:0; } }
        
        @keyframes aFadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes aShrinkOut { from { transform: scale(1); opacity: 1; } to { transform: scale(0); opacity: 0; } }
        @keyframes aFlyOutUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-200%); opacity: 0; } }
        @keyframes aFlyOutDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(200%); opacity: 0; } }
        
        @keyframes aUnblur { to { filter: blur(0px); } }

        .play-anim-container { animation-duration: 0.8s; animation-fill-mode: both; }
        
        .particle { position: absolute; pointer-events: none; z-index: 99999; }
        
        .seq-row { display: flex; align-items: stretch; background: #fff; padding: 6px; border: 1px solid #ddd; border-radius: 4px; flex-direction: column; gap: 4px; }
        .seq-row select { font-size: 11px; padding: 3px; }
    </style>
</head>
<body class="view-mode">

    <div id="side-media-panel" title="Керування звуком">
        <button id="side-play-pause" title="Пауза / Продовжити">▶️</button>
        <button id="side-stop" title="Зупинити">⏹️</button>
        <input type="range" id="global-volume" min="0" max="1" step="0.01" value="0.5" orient="vertical" title="Гучність">

    // Ініціалізація витонченого, тонкого розмиття крайків фігури
    function initEdgeBlurFilters() {
        if (document.getElementById('edge-blur-filters')) return;
        const svgNS = "http://www.w3.org/2000/svg";
        const defsSvg = document.createElementNS(svgNS, "svg");
        defsSvg.id = 'edge-blur-filters';
        defsSvg.setAttribute("width", "0"); defsSvg.setAttribute("height", "0");
        defsSvg.style.position = "absolute"; defsSvg.style.pointerEvents = "none";
        for (let i = 1; i <= 50; i++) {
            const f = document.createElementNS(svgNS, "filter");
            f.setAttribute("id", "edge-blur-" + i);
            f.setAttribute("x", "-20%"); f.setAttribute("y", "-20%"); f.setAttribute("width", "140%"); f.setAttribute("height", "140%");
            const blur = document.createElementNS(svgNS, "feGaussianBlur");
            blur.setAttribute("in", "SourceAlpha");
            // i * 0.12 робить границю розмиття надзвичайно тонкою та витонченою по самому краю
            blur.setAttribute("stdDeviation", (i * 0.12).toFixed(2));
            blur.setAttribute("result", "b");
            const comp = document.createElementNS(svgNS, "feComposite");
            comp.setAttribute("in", "SourceGraphic");
            comp.setAttribute("in2", "b");
            comp.setAttribute("operator", "in");
            f.appendChild(blur); f.appendChild(comp);
            defsSvg.appendChild(f);
        }
        document.body.appendChild(defsSvg);
    }
    window.addEventListener('DOMContentLoaded', initEdgeBlurFilters);

    window.updateElementFilters = function(el) {
        let blurVal = parseInt(el.dataset.blur) || 0;
        let edgeBlurVal = parseInt(el.dataset.edgeBlur) || 0;
        let filterStr = '';
        
        if (edgeBlurVal > 0) {
            if (!document.getElementById('edge-blur-filters')) initEdgeBlurFilters();
            filterStr += `url(#edge-blur-${edgeBlurVal}) `;
        }
        if (blurVal > 0) {
            filterStr += `blur(${blurVal}px) `;
        }
        
        el.style.filter = filterStr.trim() || 'none';
    }

    function updateSlideCounter() {
        const counterEl = document.getElementById('slide-counter');
        if (!counterEl) return;
        const slides = pArea.querySelectorAll('.slide');
        const active = getActiveSlide();
        const currentIndex = Array.from(slides).indexOf(active) + 1;
        counterEl.innerText = `Слайд ${currentIndex} з ${slides.length}`;
    }

    function triggerAutoAnimations(slide) {
        if (!slide) return;
        slide.querySelectorAll('.element').forEach(el => {
            if (el.dataset.animTrigger === 'auto') {
                runAnimations(el);
            }
        });
    }

    function goToSlide(direction) {
        const slides = pArea.querySelectorAll('.slide');
        let currentIndex = Array.from(slides).indexOf(getActiveSlide());
        let newIndex = currentIndex + direction;
        
        if (newIndex >= 0 && newIndex < slides.length) {
            slides[currentIndex].classList.remove('active');
            const transSelect = document.getElementById('slide-transition');
            const transClass = transSelect ? transSelect.value : 'trans-fade';
            slides[newIndex].className = `slide active ${transClass}`;
            
            if (typeof deselectElement === 'function') deselectElement();
            updateSlideCounter();

            if (typeof isEditMode === 'undefined' || !isEditMode) {
                triggerAutoAnimations(slides[newIndex]);
            }
        }
    }

        if (!isEditing && !sorterActive) {

        else if (type === 'f-laser') { const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sawtooth'; o.connect(g); g.connect(masterGain); o.frequency.setValueAtTime(2000, now); o.frequency.exponentialRampToValueAtTime(100, now+0.3); g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now+0.3); o.start(now); o.stop(now+0.3); }
        else if (type === 'f-sonar') { createOsc('sine', 1000, now, 0.1, 0.3); createOsc('sine', 1000, now+1.0, 0.1, 0.3); }
        else if (type === 'f-radar') { for(let i=0;i<5;i++){ createOsc('sine', 800, now+i*0.2, 0.05, 0.1); } }
        else if (type === 'f-spring') { const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='triangle'; o.connect(g); g.connect(masterGain); o.frequency.setValueAtTime(150, now); o.frequency.linearRampToValueAtTime(300, now+0.1); o.frequency.linearRampToValueAtTime(150, now+0.2); o.frequency.linearRampToValueAtTime(250, now+0.3); o.frequency.linearRampToValueAtTime(150, now+0.4); g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now+0.4); o.start(now); o.stop(now+0.4); }
    }

    function playSoundAsync(type, customData = null) {
        if (type === 'none') return Promise.resolve();
        playSound(type, customData); 
        if (type === 'custom' && customData) {
            return new Promise(res => {
                if (currentCustomAudio) {
                    currentCustomAudio.addEventListener('ended', res, {once: true});
                    currentCustomAudio.addEventListener('pause', res, {once: true});
                } else { res(); }
            });
        }
        return new Promise(res => setTimeout(res, 1200)); 
    }

    function fireParticles(x, y, type) {
        if (!document.body.animate) return;
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#00ffff', '#ff00ff', '#ffa500'];
        
        let count = 40;
        if (type === 'confetti-shower' || type === 'snow-shower') count = 100;
        if (type === 'magic-dust' || type === 'music-notes') count = 60;
        if (type === 'balloons-fly') count = 25;
        
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            let startX = x; let startY = y;
            
            if (type === 'confetti-shower' || type === 'snow-shower') { 
                startX = Math.random() * window.innerWidth; startY = -20; 
            } else if (type === 'balloons-fly') {
                startX = x + (Math.random() - 0.5) * 150; startY = y + 50;
            }
            
            p.style.left = startX + 'px'; p.style.top = startY + 'px';
            
            if (type === 'stars-burst') { p.innerText = '⭐'; p.style.fontSize = (10 + Math.random()*15) + 'px'; } 
            else if (type === 'hearts-burst') { p.innerText = '❤️'; p.style.fontSize = (10 + Math.random()*15) + 'px'; } 
            else if (type === 'bubbles-burst') { p.innerText = '🫧'; p.style.fontSize = (15 + Math.random()*25) + 'px'; }
            else if (type === 'snow-shower') { p.innerText = '❄️'; p.style.fontSize = (10 + Math.random()*15) + 'px'; }
            else if (type === 'fireworks-burst') { p.innerText = '🎆'; p.style.fontSize = (20 + Math.random()*30) + 'px'; }
            else if (type === 'magic-dust') { p.innerText = '✨'; p.style.fontSize = (10 + Math.random()*20) + 'px'; }
            else if (type === 'balloons-fly') { p.innerText = '🎈'; p.style.fontSize = (20 + Math.random()*30) + 'px'; }
            else if (type === 'music-notes') { p.innerText = ['🎵','🎶','🎼'][Math.floor(Math.random()*3)]; p.style.fontSize = (15 + Math.random()*20) + 'px'; }
            else { 
                p.style.width = (5 + Math.random()*8) + 'px'; p.style.height = (5 + Math.random()*8) + 'px'; 
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; 
            }

            document.body.appendChild(p);
            
            let tx, ty, duration;
            if (type === 'confetti-shower' || type === 'snow-shower') {
                tx = (Math.random() - 0.5) * 200; ty = window.innerHeight + 100; duration = 2000 + Math.random() * 2000;
            } else if (type === 'balloons-fly') {
                tx = (Math.random() - 0.5) * 100; ty = -window.innerHeight; duration = 2500 + Math.random() * 2000;
            } else {
                const angle = Math.random() * Math.PI * 2; 
                const velocity = 50 + Math.random() * (type === 'fireworks-burst' ? 300 : 200);
                tx = Math.cos(angle) * velocity; ty = Math.sin(angle) * velocity - (Math.random()*150); duration = 800 + Math.random() * 600;
            }
            
            const easing = (type === 'confetti-shower' || type === 'snow-shower') ? 'linear' : 'cubic-bezier(0, .9, .57, 1)';
            const anim = p.animate([{ transform: 'translate(0, 0) rotate(0deg)', opacity: 1 }, { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random()*720}deg)`, opacity: 0 }], { duration: duration, easing: easing });
            anim.onfinish = () => p.remove();
        }
    }

    function getAnimCss(name) {
        if (!name || name === 'none') return '';
        let dur = '0.8s';
        if(name === 'heartbeat') dur = '1.3s';
        if(name === 'hinge') dur = '2s';
        let map = {
            'pulse': 'aPulse', 'shake': 'aShake', 'bounce': 'aBounce', 'tada': 'aTada',
            'wobble': 'aWobble', 'flash': 'aFlash', 'rubber': 'aRubber',
            'glow-green': 'aGlowGreen', 'glow-red': 'aGlowRed', 'glow-blue': 'aGlowBlue',
            'glow-yellow': 'aGlowYellow', 'glow-purple': 'aGlowPurple',
            'glow-steady-green': 'aGlowSteadyGreen', 'glow-steady-red': 'aGlowSteadyRed',
            'glow-steady-blue': 'aGlowSteadyBlue', 'glow-steady-yellow': 'aGlowSteadyYellow',
            'glow-steady-purple': 'aGlowSteadyPurple',
            'heartbeat': 'aHeartbeat', 'hinge': 'aHinge', 'flip-x': 'aFlipX', 'flip-y': 'aFlipY',
            'zoom-out': 'aZoomOut', 'slide-out': 'aSlideOutRight', 'fade-out': 'aFadeOut',
            'shrink-out': 'aShrinkOut', 'fly-out-up': 'aFlyOutUp', 'fly-out-down': 'aFlyOutDown',
            'unblur': 'aUnblur', 'fade-in': 'fadeIn'
        };
        let aName = map[name];
        if (!aName) return '';
        return `${aName} ${dur} both`;
    }

    function playAnimAsync(el, a1, a2, a3, a4) {
        return new Promise(resolve => {
            let anims = [a1, a2, a3, a4].filter(a => a && a !== 'none');
            
            anims.forEach(a => {
                if (['confetti-burst', 'confetti-shower', 'stars-burst', 'hearts-burst', 'bubbles-burst', 'snow-shower', 'fireworks-burst', 'magic-dust', 'balloons-fly', 'music-notes'].includes(a)) {
                    const rect = el.getBoundingClientRect();
                    fireParticles(rect.left + rect.width/2, rect.top + rect.height/2, a);
                }
            });

            let cssArr = anims.map(a => getAnimCss(a)).filter(c => c);

            if (cssArr.length === 0) {
                if (anims.length > 0) setTimeout(resolve, 800); 
                else resolve();
                return;
            }

            el.style.animation = 'none';
            void el.offsetWidth;

            const handleEnd = (e) => {
                if (e.target !== el) return;
                el.removeEventListener('animationend', handleEnd);
                el.style.animation = ''; 

                const exitAnims = ['fade-out', 'shrink-out', 'fly-out-up', 'fly-out-down', 'zoom-out', 'slide-out', 'hinge'];
                const hasExit = anims.some(a => exitAnims.includes(a));

                // Правильна поведінка після завершення анімації
                if (hasExit) {
                    el.style.opacity = '0.001'; // Залишаємо прихованим, якщо це анімація зникнення
                } else if (anims.includes('fade-in') || anims.includes('unblur')) {
                    el.style.opacity = el.dataset.origOpacity || '1'; // Фіксуємо появу на 100%
                }

                if (anims.includes('unblur')) {
                    el.dataset.blur = 0;
                    if(typeof updateElementFilters === 'function') updateElementFilters(el);
                }

                resolve();
            };
            el.addEventListener('animationend', handleEnd);
            el.style.animation = cssArr.join(', ');

            setTimeout(() => {
                el.removeEventListener('animationend', handleEnd);
                resolve();
            }, 2500);
        });
    }

    async function runAnimations(el) {
        if (el.dataset.isAnimating === 'true') return; 
        el.dataset.isAnimating = 'true';

        if (el.dataset.hiddenInit === 'true') {
            el.style.opacity = el.dataset.origOpacity || '1';
        }

        let seq = JSON.parse(el.dataset.sequence || '[]');
        if (seq.length === 0) { el.dataset.isAnimating = 'false'; return; }

        let repeat = el.dataset.animRepeat || '1';
        let isInfinite = (repeat === 'infinite' || repeat === 'until-click');
        let maxLoops = isInfinite ? 999999 : parseInt(repeat);
        let loopCount = 0;

        let shouldStop = false;
        let stopFn = null;

        if (repeat === 'until-click') {
            stopFn = (e) => {
                if (e.target.closest('.element') !== el) return; 
                e.stopPropagation(); 
                shouldStop = true;
                document.removeEventListener('click', stopFn);
            };
            setTimeout(() => document.addEventListener('click', stopFn), 100);
        }

        while (loopCount < maxLoops && !shouldStop) {
            for (let step of seq) {
                if (shouldStop) break;

                let promises = [];
                if (step.sound && step.sound !== 'none') {
                    let customData = (step.sound === 'custom') ? el.dataset.customSound : null;
                    promises.push(playSoundAsync(step.sound, customData));
                }
                
                let hasAnims = (step.anim && step.anim!=='none') || (step.anim2 && step.anim2!=='none') || (step.anim3 && step.anim3!=='none') || (step.anim4 && step.anim4!=='none');
                if (hasAnims) {
                    promises.push(playAnimAsync(el, step.anim, step.anim2, step.anim3, step.anim4));
                }

                if (promises.length > 0) {
                    await Promise.all(promises); 
                } else {
                    await new Promise(r => setTimeout(r, 100)); 
                }
            }
            loopCount++;
        }

        el.style.animation = '';
        if (stopFn) document.removeEventListener('click', stopFn);
        
        const exitAnims = ['fade-out', 'shrink-out', 'fly-out-up', 'fly-out-down', 'zoom-out', 'slide-out', 'hinge'];
        let hasFadeIn = seq.some(s => s.anim === 'fade-in' || s.anim2 === 'fade-in' || s.anim3 === 'fade-in' || s.anim4 === 'fade-in');
        let hasExit = seq.some(s => exitAnims.includes(s.anim) || exitAnims.includes(s.anim2) || exitAnims.includes(s.anim3) || exitAnims.includes(s.anim4));
        let hasUnblur = seq.some(s => s.anim === 'unblur' || s.anim2 === 'unblur' || s.anim3 === 'unblur' || s.anim4 === 'unblur');
        
        // Зберігаємо потрібний стан після всіх маніпуляцій
        if (hasExit) {
            el.style.opacity = '0.001';
        } else if (hasFadeIn || el.dataset.hiddenInit === 'true') {
            el.style.opacity = el.dataset.origOpacity || '1';
        }

        if (hasUnblur) el.style.filter = 'none';

        el.dataset.isAnimating = 'false';
    }

    function migrateAllOldData(container) {
        container.querySelectorAll('.element').forEach(el => {
            let oldAnim1 = el.dataset.visual || 'none';
            let oldAnim2 = el.dataset.visual2 || 'none';
            let oldSound = el.dataset.sound || 'none';
            let oldTrig = el.dataset.soundTrigger || 'with-anim';
            
            if (!el.dataset.sequence && (oldAnim1 !== 'none' || oldAnim2 !== 'none' || oldSound !== 'none')) {
                let migrated = [];
                if (oldTrig === 'before-anim' && oldSound !== 'none') migrated.push({ anim: 'none', sound: oldSound });
                if (oldAnim1 !== 'none' || (oldTrig === 'with-anim' && oldSound !== 'none')) {
                    migrated.push({ anim: oldAnim1, sound: (oldTrig === 'with-anim') ? oldSound : 'none' });
                }
                if (oldAnim2 !== 'none') migrated.push({ anim: oldAnim2, sound: 'none' });
                if (oldTrig === 'after-anim' && oldSound !== 'none') migrated.push({ anim: 'none', sound: oldSound });
                
                if (migrated.length === 0 && oldSound !== 'none') migrated.push({ anim: 'none', sound: oldSound });

                if (migrated.length > 0) el.dataset.sequence = JSON.stringify(migrated);
            }
            
            el.removeAttribute('data-visual'); el.removeAttribute('data-visual2');
            el.removeAttribute('data-sound'); el.removeAttribute('data-sound-trigger');
        });
    }

    let vDragEl = null;
    let vStartX, vStartY, vInitX, vInitY;
    let vWasDragged = false;
    let vDragScale = 1;

    pArea.addEventListener('mousedown', (e) => {
        vWasDragged = false;
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        
        const targetEl = e.target.closest('.element');
        if (targetEl && targetEl.dataset.draggablePlay === 'true') {
            vDragScale = pArea.getBoundingClientRect().width / pArea.offsetWidth || 1;
            vDragEl = targetEl;
            vStartX = e.clientX;
            vStartY = e.clientY;
            vInitX = vDragEl.offsetLeft;
            vInitY = vDragEl.offsetTop;
            
            vDragEl.dataset.origZIndex = vDragEl.style.zIndex || '1';
            vDragEl.style.zIndex = '99999';
            vDragEl.style.transition = 'transform 0.1s ease';
            vDragEl.classList.add('draggable-play');
            
            if (!vDragEl.style.transform.includes('scale(')) {
                vDragEl.style.transform = (vDragEl.style.transform || '') + ' scale(1.05)';
            }
            e.preventDefault();
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        if (vDragEl) {
            let dx = (e.clientX - vStartX) / vDragScale;
            let dy = (e.clientY - vStartY) / vDragScale;
            
            if (Math.abs(dx * vDragScale) > 5 || Math.abs(dy * vDragScale) > 5) {
                vWasDragged = true;
            }
            vDragEl.style.left = vInitX + dx + 'px';
            vDragEl.style.top = vInitY + dy + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        if (vDragEl) {
            vDragEl.style.zIndex = vDragEl.dataset.origZIndex;
            vDragEl.style.transform = vDragEl.style.transform.replace(' scale(1.05)', '').trim();
            vDragEl.classList.remove('draggable-play');
            vDragEl = null;
        }
    });

    pArea.addEventListener('click', (e) => {
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        if (vWasDragged) {
            vWasDragged = false;
            return; 
        }
        
        const targetEl = e.target.closest('.interactive');
        if (targetEl && e.detail === 1) { 
            if (targetEl.dataset.hiddenInit === 'true') {
                targetEl.style.opacity = targetEl.dataset.origOpacity || '1';
            }
            if (!targetEl.dataset.animTrigger || targetEl.dataset.animTrigger === 'click') {
                runAnimations(targetEl);
            }

            const action = targetEl.dataset.action;
            if (action === 'nextSlide') setTimeout(() => goToSlide(1), 700);
            if (action === 'prevSlide') setTimeout(() => goToSlide(-1), 700);
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        migrateAllOldData(pArea);
        
        if (typeof isEditMode === 'undefined' || !isEditMode) {
            // Примусово приховуємо потрібні елементи при старті збереженої гри
            pArea.querySelectorAll('.element').forEach(el => {
                if (!el.dataset.origOpacity || el.dataset.origOpacity === '0.001') {
                    el.dataset.origOpacity = el.style.opacity || '1';
                }
                let seq = JSON.parse(el.dataset.sequence || '[]');
                let hasFadeIn = seq.some(s => s.anim === 'fade-in' || s.anim2 === 'fade-in' || s.anim3 === 'fade-in' || s.anim4 === 'fade-in');

                if (el.dataset.hiddenInit === 'true' || hasFadeIn) {
                    el.style.opacity = '0.001';
                }
            });

            const activeSlide = getActiveSlide();
            if (activeSlide) {
                triggerAutoAnimations(activeSlide);
            }
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        if (typeof isEditMode === 'undefined' || !isEditMode) {
            const overlay = document.createElement('div');
            overlay.id = 'device-selector';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:sans-serif;';
            
            overlay.innerHTML = `
                <h2 style="margin-bottom: 30px; font-size: 28px; text-align:center;">🎮 На чому ти граєш?</h2>
                <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">
                    <button id="btn-pc" style="font-size:50px; padding:20px 30px; border-radius:15px; cursor:pointer; border:none; background:#007bff; color:white; transition:transform 0.2s; box-shadow:0 10px 20px rgba(0,0,0,0.3);">💻<br><span style="font-size:18px; font-weight:bold;">Комп'ютер</span></button>
                    <button id="btn-mobile" style="font-size:50px; padding:20px 30px; border-radius:15px; cursor:pointer; border:none; background:#28a745; color:white; transition:transform 0.2s; box-shadow:0 10px 20px rgba(0,0,0,0.3);">📱<br><span style="font-size:18px; font-weight:bold;">Телефон / Планшет</span></button>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('btn-pc').onclick = () => overlay.remove();
            
            document.getElementById('btn-mobile').onclick = () => {
                overlay.remove();
                document.getElementById('global-volume').style.display = 'none';
                
                const mediaPanel = document.getElementById('side-media-panel');
                mediaPanel.style.top = '15px';
                mediaPanel.style.right = '15px';
                mediaPanel.style.bottom = 'auto';
                mediaPanel.style.left = 'auto';
                mediaPanel.style.transform = 'none';
                mediaPanel.style.flexDirection = 'row';
                mediaPanel.style.padding = '10px';

                let maxW = 1280, maxH = 720; 
                document.querySelectorAll('.element').forEach(el => {
                    let r = el.offsetLeft + el.offsetWidth;
                    let b = el.offsetTop + el.offsetHeight;
                    if (r > maxW) maxW = r;
                    if (b > maxH) maxH = b;
                });
                
                pArea.style.width = maxW + 'px';
                pArea.style.height = maxH + 'px';
                pArea.style.transformOrigin = 'center center';
                pArea.style.position = 'absolute';
                pArea.style.left = '50%';
                pArea.style.top = '50%';
                
                function applyScale() {
                    let scale = Math.min(window.innerWidth / maxW, window.innerHeight / maxH);
                    pArea.style.transform = `translate(-50%, -50%) scale(${scale})`;
                }
                applyScale();
                window.addEventListener('resize', applyScale);
                window.addEventListener('orientationchange', () => setTimeout(applyScale, 200));

                let touchStartX = 0;
                let touchStartY = 0;
                let isMultiTouch = false;
                
                document.addEventListener('touchstart', e => {
                    if (e.touches.length > 1) {
                        isMultiTouch = true;
                    } else {
                        isMultiTouch = false;
                        touchStartX = e.touches[0].screenX;
                        touchStartY = e.touches[0].screenY;
                    }
                }, {passive: true});
                
                document.addEventListener('touchend', e => {
                    if (vWasDragged || isMultiTouch) return;
                    if (e.changedTouches.length > 0) {
                        let dx = e.changedTouches[0].screenX - touchStartX;
                        let dy = e.changedTouches[0].screenY - touchStartY;
                        if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)) {
                            if (dx > 0) goToSlide(-1); 
                            else goToSlide(1); 
                        }
                    }
                }, {passive: true});
                
                if (window.innerHeight > window.innerWidth) {
                    alert("🔄 Для кращої гри переверни пристрій горизонтально!");
                }
            };
        }
    });

    pArea.addEventListener('touchstart', (e) => {
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        initAudio(); 
        
        const touch = e.touches[0];
        const targetEl = touch.target.closest('.element');
        if (targetEl && targetEl.dataset.draggablePlay === 'true') {
            vWasDragged = false;
            vDragScale = pArea.getBoundingClientRect().width / pArea.offsetWidth || 1;
            vDragEl = targetEl;
            vStartX = touch.clientX; vStartY = touch.clientY;
            vInitX = vDragEl.offsetLeft; vInitY = vDragEl.offsetTop;
            vDragEl.dataset.origZIndex = vDragEl.style.zIndex || '1';
            vDragEl.style.zIndex = '99999';
            vDragEl.classList.add('draggable-play');
            e.preventDefault(); 
        }
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        if (vDragEl) {
            const touch = e.touches[0];
            let dx = (touch.clientX - vStartX) / vDragScale;
            let dy = (touch.clientY - vStartY) / vDragScale;
            if (Math.abs(dx * vDragScale) > 5 || Math.abs(dy * vDragScale) > 5) vWasDragged = true;
            vDragEl.style.left = vInitX + dx + 'px';
            vDragEl.style.top = vInitY + dy + 'px';
            e.preventDefault();
        }
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
        if (typeof isEditMode !== 'undefined' && isEditMode) return;
        if (vDragEl) {
            vDragEl.style.zIndex = vDragEl.dataset.origZIndex;
            vDragEl.classList.remove('draggable-play');
            
            if (!vWasDragged) {
                if (vDragEl.dataset.hiddenInit === 'true') {
                    vDragEl.style.opacity = vDragEl.dataset.origOpacity || '1';
                }
                if (!vDragEl.dataset.animTrigger || vDragEl.dataset.animTrigger === 'click') {
                    runAnimations(vDragEl);
                }
                const action = vDragEl.dataset.action;
                if (action === 'nextSlide') setTimeout(() => goToSlide(1), 700);
                if (action === 'prevSlide') setTimeout(() => goToSlide(-1), 700);
            }
            
            vDragEl = null;
        }
